<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tenant.company_name or tenant.name }} - {{ document_title }}</title>
    <style>
        @page {
            size: A4;
            margin: 1cm;
        }
        
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 11pt;
            line-height: 1.4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .header {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .company-logo {
            max-height: 60px;
            max-width: 200px;
        }
        
        .company-info {
            margin-top: 10px;
        }
        
        .company-name {
            font-size: 18pt;
            font-weight: bold;
            color: #1F2937;
        }
        
        .company-details {
            font-size: 9pt;
            color: #666;
            margin-top: 5px;
        }
        
        .document-title {
            font-size: 14pt;
            font-weight: bold;
            color: #1F2937;
            text-align: center;
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .document-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 10pt;
        }
        
        .meta-section {
            width: 48%;
        }
        
        .meta-label {
            font-weight: bold;
            color: #666;
        }
        
        .meta-value {
            margin-bottom: 5px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 10pt;
        }
        
        th {
            background-color: #1F2937;
            color: white;
            padding: 8px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #333;
        }
        
        td {
            padding: 8px;
            border: 1px solid #ddd;
        }
        
        .table-header {
            background-color: #1F2937;
            color: white;
        }
        
        .table-row:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        .signatures {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            page-break-inside: avoid;
        }
        
        .signature-box {
            width: 23%;
            text-align: center;
            border: 1px solid #ddd;
            padding: 20px 10px;
            min-height: 120px;
        }
        
        .signature-label {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 10pt;
        }
        
        .signature-name {
            margin-top: 30px;
            font-weight: bold;
            font-size: 10pt;
        }
        
        .signature-date {
            font-size: 9pt;
            color: #666;
        }
        
        .signature-image {
            max-height: 40px;
            max-width: 100px;
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 9pt;
            color: #666;
            text-align: center;
            page-break-inside: avoid;
        }
        
        .footer-text {
            margin-bottom: 5px;
        }
        
        .gst-info {
            font-size: 9pt;
            color: #666;
        }
        
        .section-title {
            font-size: 12pt;
            font-weight: bold;
            color: #1F2937;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        
        .total-row {
            font-weight: bold;
            background-color: #f0f0f0;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9pt;
            font-weight: bold;
        }
        
        .status-planned { background-color: #e5e7eb; color: #374151; }
        .status-released { background-color: #dbeafe; color: #1e40af; }
        .status-in_progress { background-color: #fef3c7; color: #92400e; }
        .status-completed { background-color: #d1fae5; color: #065f46; }
        .status-closed { background-color: #f3f4f6; color: #374151; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    
    <div class="footer">
        <div class="footer-text">{{ tenant.footer_text or '' }}</div>
        {% if tenant.gst_number %}
        <div class="gst-info">GST: {{ tenant.gst_number }}</div>
        {% endif %}
        <div class="gst-info">
            {{ tenant.address or '' }} | {{ tenant.phone or '' }} | {{ tenant.email or '' }}
        </div>
    </div>
</body>
</html>
