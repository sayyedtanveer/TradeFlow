{% extends "base.html" %}
{% block content %}
<h1>Pick List {{ pick_list_number }}</h1>
<p>Work Order: {{ wo_number }}</p>
<table>
  <thead>
    <tr><th>#</th><th>Material</th><th>Location</th><th>Qty</th></tr>
  </thead>
  <tbody>
    {% for line in lines %}
    <tr>
      <td>{{ line.sequence }}</td>
      <td>{{ line.material_code }}</td>
      <td>{{ line.location }}</td>
      <td>{{ line.quantity }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
