[pytest]
# Pytest configuration for MedTrack test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = backend/tests

# Asyncio mode for async testing
asyncio_mode = auto

# Markers for test categorization
markers =
    unit: Unit tests (pure logic, no dependencies)
    api: API integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    integration: Integration tests

# Coverage configuration
[coverage:run]
source = backend/app
branch = True
omit =
    */tests/*
    */venv/*
    */site-packages/*
    backend/app/__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    class .*\(Protocol\):

fail_under = 75
precision = 2

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
